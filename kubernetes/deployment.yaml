apiVersion: v1
kind: Secret
metadata:
  name: dashboard-secrets
  namespace: baymax-tools
type: Opaque
stringData:
  PVE_TOKEN: "clawd@pam!clawd_admin=2e1a4653-fcea-4ba0-82e7-455ffb02a1c4"
  KUBE_TOKEN: ""
  KUBE_CA: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-dashboard
  namespace: baymax-tools
  labels:
    app: infra-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-dashboard
  template:
    metadata:
      labels:
        app: infra-dashboard
    spec:
      serviceAccountName: infra-dashboard-reader
      containers:
        - name: dashboard
          image: ghcr.io/unwrntd/infra-dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            - name: PVE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dashboard-secrets
                  key: PVE_TOKEN
            - name: KUBE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dashboard-secrets
                  key: KUBE_TOKEN
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: infra-dashboard
  namespace: baymax-tools
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: infra-dashboard
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infra-dashboard
  namespace: baymax-tools
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: dashboard.safdia.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infra-dashboard
                port:
                  number: 3000
  tls:
    - hosts:
        - dashboard.safdia.com
      secretName: dashboard-tls
