apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-dashboard-reader
  namespace: baymax-tools
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infra-dashboard-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-dashboard-reader
subjects:
  - kind: ServiceAccount
    name: infra-dashboard-reader
    namespace: baymax-tools
roleRef:
  kind: ClusterRole
  name: infra-dashboard-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: infra-dashboard-reader-token
  namespace: baymax-tools
  annotations:
    kubernetes.io/service-account.name: infra-dashboard-reader
type: kubernetes.io/service-account-token
