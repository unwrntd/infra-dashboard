apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-dashboard
  namespace: baymax-tools
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infra-dashboard
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["services", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-dashboard
subjects:
  - kind: ServiceAccount
    name: infra-dashboard
    namespace: baymax-tools
roleRef:
  kind: ClusterRole
  name: infra-dashboard
  apiGroup: rbac.authorization.k8s.io
